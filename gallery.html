ry@main/images/album/album-021.jpg","https://cdn.jsdelivr.net/gh/luohaijun8888-art/artisan-gallery@main/images/album/album-022.jpg","https://cdn.jsdelivr.net/gh/luohaijun8888-art/artisan-gallery@main/images/album/album-023.jpg","https://cdn.jsdelivr.net/gh/luohaijun8888-art/artisan-gallery@main/images/album/album-024.jpg","https://cdn.jsdelivr.net/gh/luohaijun8888-art/artisan-gallery@main/images/album/album-025.jpg","https://cdn.jsdelivr.net/gh/luohaijun8888-art/artisan-gallery@main/images/album/album-026.jpg","https://cdn.jsdelivr.net/gh/luohaijun8888-art/artisan-gallery@main/images/album/album-027.jpg","https://cdn.jsdelivr.net/gh/luohaijun8888-art/artisan-gallery@main/images/album/album-028.jpg","https://cdn.jsdelivr.net/gh/luohaijun8888-art/artisan-gallery@main/images/album/album-029.jpg","https://cdn.jsdelivr.net/gh/luohaijun8888-art/artisan-gallery@main/images/album/album-030.jpg","https://cdn.jsdelivr.net/gh/luohaijun8888-art/artisan-gallery@main/images/album/album-031.jpg","https://cdn.jsdelivr.net/gh/luohaijun8888-art/artisan-gallery@main/images/album/album-032.jpg","https://cdn.jsdelivr.net/gh/luohaijun8888-art/artisan-gallery@main/images/album/album-033.jpg","https://cdn.jsdelivr.net/gh/luohaijun8888-art/artisan-gallery@main/images/album/album-034.jpg","https://cdn.jsdelivr.net/gh/luohaijun8888-art/artisan-gallery@main/images/album/album-035.jpg","https://cdn.jsdelivr.net/gh/luohaijun8888-art/artisan-gallery@main/images/album/album-036.jpg","https://cdn.jsdelivr.net/gh/luohaijun8888-art/artisan-gallery@main/images/album/album-037.jpg"];
    let cur = 0;
    const lb = document.getElementById('lightbox');
    const lbImg = document.getElementById('lbImg');
    const lbCount = document.getElementById('lbCount');
    function openLightbox(i){ cur = i; show(); lb.classList.add('open'); }
    function closeLightbox(){ lb.classList.remove('open'); }
    function show(){ lbImg.src = IMAGES[cur]; lbCount.textContent = (cur+1) + ' / ' + IMAGES.length; }
    function prevImg(){ cur = (cur - 1 + IMAGES.length) % IMAGES.length; show(); }
    function nextImg(){ cur = (cur + 1) % IMAGES.length; show(); }
    document.addEventListener('keydown', e => {
      if(!lb.classList.contains('open')) return;
      if(e.key === 'Escape') closeLightbox();
      if(e.key === 'ArrowLeft') prevImg();
      if(e.key === 'ArrowRight') nextImg();
    });
  </script>
