<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHANYAO | 3D 艺术画廊 · 纯粹视界</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Noto+Serif+SC:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --accent: #CC9933;       
            --bg-radial: radial-gradient(circle at center, #26252a 0%, #0d0c0f 100%);
            --card-base: #0f0e12;
        }

        body { 
            background: var(--bg-radial); 
            overflow: hidden; 
            margin: 0;
            padding: 0;
            height: 100vh; 
            font-family: 'Inter', 'Noto Serif SC', serif;
        }

        .scene { 
            position: relative; 
            width: 100vw; 
            height: 100vh; 
            perspective: 1800px; 
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stage-spotlight {
            position: absolute;
            width: 1100px;
            height: 1100px;
            background: radial-gradient(circle, rgba(204, 153, 51, 0.12) 0%, rgba(0,0,0,0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 1;
            border-radius: 50%;
            opacity: 0.65;
        }

        /* 卡片样式：图片完整显示 */
        .card {
            position: absolute; 
            top: 50%;
            left: 50%;
            width: 56vh; 
            height: 70vh;
            max-width: 82vw;
            max-height: 68vh;
            background-color: var(--card-base); 
            border-radius: 28px;
            overflow: hidden;
            color: #fff; 
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 45px 85px -25px rgba(0, 0, 0, 0.8), 0 0 0 0.5px rgba(255,255,255,0.05);
            cursor: grab;
            transform-origin: center center;
            backface-visibility: hidden;
            will-change: transform;
            transition: box-shadow 0.25s ease;
        }
        
        .card:active { cursor: grabbing; }
        .card:hover {
            box-shadow: 0 55px 100px -20px rgba(0, 0, 0, 0.95), 0 0 0 1px rgba(204,153,51,0.3);
        }

        @media (max-width: 768px) {
            .card {
                width: 72vw;
                height: 58vh;
                max-width: 85vw;
                max-height: 60vh;
                border-radius: 24px;
            }
        }

        .backdrop-dim {
            position: fixed;
            inset: 0;
            background: rgba(5, 4, 8, 0.96);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.45s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            z-index: 10;
            backdrop-filter: blur(8px);
        }
        .backdrop-dim.active {
            opacity: 1;
            pointer-events: auto;
        }

        .glass-header {
            background: rgba(21, 20, 25, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 图片完整显示 contain + 深色衬底 */
        .card-img-full {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #0a090c;
            transition: transform 0.4s ease-out;
            z-index: 0;
            pointer-events: none;
            user-drag: none;
            -webkit-user-drag: none;
            padding: 8px;
        }
        
        .card:hover .card-img-full {
            transform: scale(1.01);
        }
        
        .card-content-overlay {
            position: absolute;
            inset: 0;
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background: linear-gradient(to bottom, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.4) 30%, rgba(0,0,0,0.8) 100%);
            border-radius: 28px;
            pointer-events: none;
        }
        
        .card-category {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(12px);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 9px;
            letter-spacing: 0.2em;
            font-weight: 600;
            color: #CC9933;
            border: 0.5px solid rgba(255,255,255,0.2);
            text-transform: uppercase;
            z-index: 3;
            pointer-events: none;
        }
        
        .card-title-bottom {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 32px 18px 24px 18px;
            background: linear-gradient(to top, #000000dd, #00000066 60%, transparent);
            text-align: center;
            backdrop-filter: blur(2px);
            z-index: 3;
            pointer-events: none;
        }
        
        .card-title-bottom h3 {
            font-weight: 300;
            letter-spacing: 0.18em;
            font-size: 1rem;
            text-shadow: 0 2px 8px rgba(0,0,0,0.6);
        }
        
        @media (max-width: 768px) {
            .card-category { top: 14px; right: 14px; padding: 4px 10px; font-size: 8px; }
            .card-title-bottom h3 { font-size: 0.85rem; letter-spacing: 0.15em; }
            .card-title-bottom { padding: 24px 15px 18px 15px; }
            .card-img-full { padding: 4px; }
        }
        
        #carousel {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* 详情页 - 精简版：只保留画廊标题、主图和延展图卷，移除价格/设计哲学等冗余区块 */
        .detail-hero-wrapper {
            width: 100%;
            background: #18171C;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .detail-hero-img {
            width: 100%;
            height: auto;
            max-height: 55vh;
            object-fit: contain;
            display: block;
            margin: 0 auto;
        }
        
        .detail-image-grid {
            width: 100%;
        }
        .detail-image-item {
            width: 100%;
            margin-bottom: 1.5rem;
            background: #1C1B20;
            border-radius: 1.25rem;
            border: 1px solid rgba(255,255,255,0.05);
            overflow: hidden;
            transition: all 0.2s;
        }
        .detail-image-item img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
            background: #0f0e12;
        }
        .detail-image-item:hover {
            border-color: rgba(204,153,51,0.3);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        
        @media (max-width: 768px) {
            .detail-hero-wrapper { padding: 1rem; }
        }
        
        /* 返回首页按钮 - 中下位置 */
        .back-home-btn {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 70;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(20, 20, 28, 0.75);
            backdrop-filter: blur(12px);
            padding: 10px 20px;
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: all 0.2s ease;
            text-decoration: none;
            font-size: 10px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #ccc;
            font-weight: 500;
        }
        .back-home-btn:hover {
            background: rgba(204, 153, 51, 0.85);
            color: #111;
            border-color: rgba(255,215,0,0.6);
            transform: translateX(-50%) scale(1.03);
            box-shadow: 0 0 15px rgba(204,153,51,0.4);
        }

        /* 小工具按钮 - 右上角 */
        .widgets-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 80;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: rgba(22,22,21,0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            color: rgba(255,255,255,0.7);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 999px;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-decoration: none;
            transition: all 0.3s;
        }
        .widgets-btn:hover {
            background: rgba(204,153,51,0.85);
            color: #111;
            border-color: rgba(255,215,0,0.6);
        }
        
        html, body { overflow: hidden; position: fixed; width: 100%; height: 100%; }
    </style>
</head>
<body class="selection:bg-neutral-800">

    <div class="backdrop-dim" id="backdropDim" onclick="closeDetail()"></div>

    <!-- 返回首页按钮：中下位置 -->
    <a href="index.html" class="back-home-btn" id="backHomeBtn">
        <i data-lucide="home" class="w-3.5 h-3.5"></i>
        <span>返回首页</span>
    </a>

    <div class="absolute top-8 left-1/2 -translate-x-1/2 z-20 text-center pointer-events-none">
        <h2 class="text-[10px] uppercase tracking-[0.4em] text-[#CC9933] font-semibold mb-2 opacity-80">AESTHETIC SCENE</h2>
        <h1 class="text-xl md:text-2xl font-light tracking-[0.25em] text-white/95">SHANYAO GALLERY</h1>
    </div>
    <a href="widgets.html" class="widgets-btn" id="widgetsBtn">
        <i data-lucide="wrench" class="w-3.5 h-3.5"></i>
        <span>小工具</span>
    </a>

    <div class="scene" id="scene">
        <div class="stage-spotlight"></div>
        <div id="carousel"></div>
    </div>

    <!-- 详情页 - 极简：仅保留主图、标题与空间延展图卷，移除价格、设计哲学等冗余内容 -->
    <div id="detailPage" class="fixed inset-y-0 right-0 w-full md:w-[560px] bg-[#151419] z-[150] shadow-2xl translate-x-full transition-transform duration-700 cubic-bezier(0.15, 0.85, 0.35, 1) overflow-y-auto border-l border-white/[0.05] no-scrollbar">
        <div class="sticky top-0 z-50 glass-header border-b border-white/[0.05] flex items-center justify-between h-16 px-6">
            <button onclick="closeDetail()" class="flex items-center gap-2 text-xs uppercase tracking-[0.2em] text-neutral-400 hover:text-white transition-colors">
                <i data-lucide="arrow-left" class="w-4 h-4 stroke-[1.5]"></i>
                <span>返回画廊 / BACK</span>
            </button>
            <div class="text-[10px] font-semibold tracking-[0.2em] uppercase text-[#CC9933]" id="detailCategory"></div>
            <div class="w-12"></div>
        </div>

        <div class="pb-24">
            <!-- 主图区域 -->
            <div class="detail-hero-wrapper">
                <img id="detailHeroImg" src="" alt="Hero Image" class="detail-hero-img">
            </div>

            <!-- 仅保留作品标题，其余描述、价格全部移除 -->
            <div class="px-6 pt-4 pb-2">
                <h1 class="text-xl md:text-2xl font-light tracking-wider text-white text-center font-serif" id="detailTitle"></h1>
            </div>
            
            <!-- 空间延展图卷 -->
            <div class="px-6 pt-8 space-y-6">
                <div class="text-center">
                    <p class="text-[9px] uppercase tracking-[0.3em] text-[#CC9933] font-semibold mb-1">SCENARIO DETAILS</p>
                    <h3 class="text-xs font-light tracking-widest text-neutral-500">— 空间延展图卷 —</h3>
                </div>
                <div id="detailWaterfall" class="detail-image-grid space-y-5"></div>
            </div>
        </div>
    </div>

    <script>
        const carousel = document.getElementById('carousel');
        const backdropDim = document.getElementById('backdropDim');
        
        let targetOffset = 0;
        let currentOffset = 0;
        let isDetailOpen = false;

        const GITHUB_REPO = "luohaijun8888-art/artisan-gallery";
        const GITHUB_API = "https://api.github.com/repos/" + GITHUB_REPO + "/contents/products.json";
        const _tk = ['github_pat_11CCANEGA0','oHmccUGuDviI_5Ct5X','ZQSxg7bz0OPa3Z8PX','Vg9vRIxbP3VlVVozYQ','9c3Y5XKVFXTEMf9Ukrr'];
        const EMBEDDED_TOKEN = _tk.join('');
        
        let allProducts = [];
        let inspirationProducts = [];
        let numCards = 0;

        function getSafeLocalStorage(key) {
            try { return localStorage.getItem(key); } catch (e) { return null; }
        }

        async function fetchProducts() {
            try {
                const headers = { 'Accept': 'application/vnd.github+json', 'X-GitHub-Api-Version': '2022-11-28' };
                if (EMBEDDED_TOKEN) headers['Authorization'] = 'Bearer ' + EMBEDDED_TOKEN;
                const res = await fetch(GITHUB_API, { headers, cache: 'no-store' });
                if (!res.ok) throw new Error('云端获取失败');
                const data = await res.json();
                const content = JSON.parse(decodeURIComponent(escape(atob(data.content))));
                allProducts = content.products || [];
            } catch(e) {
                console.error(e);
                const cached = getSafeLocalStorage('furniture_gallery_db');
                allProducts = cached ? JSON.parse(cached) : [];
            }
            
            inspirationProducts = allProducts.filter(p => (p.page || '首页') === '灵感');
            if (inspirationProducts.length === 0) {
                inspirationProducts = [
                    { name: "华尔兹极奢岩石柜", price: "18900", images: ["https://images.unsplash.com/photo-1595428774223-ef52624120d2?auto=format&fit=crop&w=1600&q=85"], category: "书架", description: "极致利落骨骼与冷岩肌理交融" },
                    { name: "奥德赛东方罗汉榻", price: "24500", images: ["https://images.unsplash.com/photo-1505691938895-1758d7feb511?auto=format&fit=crop&w=1600&q=85"], category: "床", description: "古典骨架融合现代极简泡棉工艺" },
                    { name: "圆舞曲黑檀木茶几", price: "14800", images: ["https://images.unsplash.com/photo-1533090161767-e6ffed986c88?auto=format&fit=crop&w=1600&q=85"], category: "茶几", description: "精选百年高密度黑檀木纯手工旋切" },
                    { name: "北欧极简中古休闲椅", price: "8600", images: ["https://images.unsplash.com/photo-1493663284031-b7e3aefcae8e?auto=format&fit=crop&w=1600&q=85"], category: "餐椅", description: "经典流线剪影，精纺马海毛座面" },
                    { name: "空灵之境艺术屏风", price: "32200", images: ["https://images.unsplash.com/photo-1551298370-9d3d53740c72?auto=format&fit=crop&w=1600&q=85"], category: "屏风", description: "半透云纱与手工木构的禅意共鸣" }
                ];
            }
            numCards = inspirationProducts.length;
            renderDynamicCards();
        }

        function renderDynamicCards() {
            carousel.innerHTML = '';
            inspirationProducts.forEach((p, idx) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.index = idx;
                const imgUrl = (p.images && p.images[0]) ? p.images[0] : (p.img || "https://images.unsplash.com/photo-1616486338812-3dadae4b4ace?auto=format&fit=crop&w=1600&q=80");
                card.innerHTML = `
                    <img class="card-img-full" src="${imgUrl}" alt="${p.name}" draggable="false" onerror="this.onerror=null; this.src='https://placehold.co/1200x1600/1c1b20/CC9933?text=SHANYAO'">
                    <div class="card-content-overlay">
                        <div class="card-category">${p.category || p.tag || 'ATELIER'}</div>
                        <div class="card-title-bottom"><h3>${p.name}</h3></div>
                    </div>
                `;
                card.addEventListener('click', (e) => {
                    if (isSwiping || isDraggingActive) {
                        e.preventDefault();
                        e.stopPropagation();
                        return;
                    }
                    let diff = idx - Math.round(currentOffset);
                    const N = numCards;
                    diff = ((diff + N/2) % N + N) % N - N/2;
                    if (Math.abs(diff) === 0) {
                        openDetailPage(p);
                    } else {
                        targetOffset += diff;
                    }
                    e.stopPropagation();
                });
                carousel.appendChild(card);
            });
            lucide.createIcons();
        }

        // 详情页：移除价格、设计哲学等一切冗余，只保留标题、主图和延展图卷
        function openDetailPage(p) {
            if (isDetailOpen) return;
            document.getElementById('detailTitle').textContent = p.name;
            document.getElementById('detailCategory').textContent = `COLLECTION / ${p.category || p.tag || 'LIMITED EDITION'}`;
            const heroImgUrl = (p.images && p.images[0]) ? p.images[0] : (p.img || "https://images.unsplash.com/photo-1616486338812-3dadae4b4ace?auto=format&fit=crop&w=1200&q=80");
            document.getElementById('detailHeroImg').src = heroImgUrl;
            
            const waterfall = document.getElementById('detailWaterfall');
            const detailImgs = (p.detailImages && p.detailImages.length) ? p.detailImages : (p.images ? p.images : [heroImgUrl]);
            waterfall.innerHTML = detailImgs.map(img => `
                <div class="detail-image-item">
                    <img src="${img}" alt="detail view" loading="lazy" onerror="this.src='https://placehold.co/1000x800/1c1b20/CC9933?text=SHANYAO'">
                </div>
            `).join('');
            
            document.getElementById('detailPage').classList.remove('translate-x-full');
            document.getElementById('detailPage').classList.add('translate-x-0');
            backdropDim.classList.add('active');
            isDetailOpen = true;
            setTimeout(() => lucide.createIcons(), 50);
        }

        window.closeDetail = function() {
            document.getElementById('detailPage').classList.remove('translate-x-0');
            document.getElementById('detailPage').classList.add('translate-x-full');
            backdropDim.classList.remove('active');
            isDetailOpen = false;
        };

        // 动画引擎：卡片间距缩小 2/3 (原始 baseTranslateX 大幅减小)
        function animate() {
            if (numCards > 0) {
                currentOffset += (targetOffset - currentOffset) * 0.12;
                const isMobile = window.innerWidth < 768;
                // 关键：卡片间距缩小为原来的 1/3 左右，原始约为 0.78/0.52，现在缩小约 2/3 → 乘以 0.35 系数
                const spacingFactor = 0.35;
                const baseTranslateX = isMobile ? window.innerWidth * 0.78 * spacingFactor : window.innerWidth * 0.52 * spacingFactor;
                const N = numCards;
                const cards = document.querySelectorAll('.card');
                for (let i = 0; i < cards.length; i++) {
                    const card = cards[i];
                    let diff = i - currentOffset;
                    diff = ((diff + N/2) % N + N) % N - N/2;
                    const absDiff = Math.abs(diff);
                    const x = diff * baseTranslateX;
                    const z = -absDiff * 80;      // 景深也适当减小更紧凑
                    const scale = Math.max(0.55, 1 - absDiff * 0.08);
                    const opacityVal = Math.max(0.2, 1 - absDiff * 0.45);
                    const brightnessVal = Math.max(0.5, 1 - absDiff * 0.2);
                    card.style.transform = `translate(-50%, -50%) translateX(${x}px) translateZ(${z}px) scale(${scale})`;
                    card.style.zIndex = Math.round(100 - absDiff * 6);
                    card.style.filter = `brightness(${brightnessVal})`;
                    card.style.opacity = absDiff > 2.4 ? 0 : opacityVal;
                }
            }
            requestAnimationFrame(animate);
        }
        
        let autoRotateSpeed = 0.0012;
        let autoRotateActive = true;
        function startAutoRotate() {
            function autoTick() {
                if (!isDetailOpen && !isDraggingActive && autoRotateActive && numCards > 0) {
                    targetOffset += autoRotateSpeed;
                    if (Math.abs(targetOffset) > 10000) targetOffset = targetOffset % numCards;
                }
                requestAnimationFrame(autoTick);
            }
            autoTick();
        }
        
        // 拖拽系统（按住滑动）
        let isDraggingActive = false;
        let isSwiping = false;
        let dragStartX = 0;
        let dragStartOffsetValue = 0;
        
        function onPointerStart(clientX) {
            if (isDetailOpen) return;
            isDraggingActive = true;
            isSwiping = false;
            dragStartX = clientX;
            dragStartOffsetValue = targetOffset;
            autoRotateActive = false;
            document.body.style.cursor = 'grabbing';
        }
        
        function onPointerMove(clientX) {
            if (!isDraggingActive) return;
            const deltaX = clientX - dragStartX;
            if (Math.abs(deltaX) > 5) isSwiping = true;
            // 灵敏度微调，因为间距缩小，拖动响应保持舒适
            const sensitivity = window.innerWidth < 768 ? 0.0045 : 0.0032;
            targetOffset = dragStartOffsetValue - deltaX * sensitivity;
        }
        
        function onPointerEnd() {
            if (!isDraggingActive) return;
            isDraggingActive = false;
            autoRotateActive = true;
            if (numCards > 0) targetOffset = Math.round(targetOffset);
            document.body.style.cursor = '';
            setTimeout(() => { if (!isDraggingActive) isSwiping = false; }, 50);
        }
        
        function bindDragEvents() {
            window.addEventListener('mousedown', (e) => {
                if (e.target.closest('#backHomeBtn')) return;
                onPointerStart(e.clientX);
                e.preventDefault();
            });
            window.addEventListener('mousemove', (e) => { if (isDraggingActive) { e.preventDefault(); onPointerMove(e.clientX); } });
            window.addEventListener('mouseup', () => { if (isDraggingActive) onPointerEnd(); });
            window.addEventListener('touchstart', (e) => {
                if (e.target.closest('#backHomeBtn')) return;
                if (e.touches.length) { onPointerStart(e.touches[0].clientX); e.preventDefault(); }
            }, { passive: false });
            window.addEventListener('touchmove', (e) => {
                if (isDraggingActive && e.touches.length) { e.preventDefault(); onPointerMove(e.touches[0].clientX); }
            }, { passive: false });
            window.addEventListener('touchend', () => { if (isDraggingActive) onPointerEnd(); });
        }
        
        function init() {
            fetchProducts().then(() => {
                if (numCards > 0) { targetOffset = 0; currentOffset = 0; }
                setTimeout(() => lucide.createIcons(), 80);
            });
            bindDragEvents();
            animate();
            startAutoRotate();
            lucide.createIcons();
        }
        
        init();
    </script>
</body>
</html>
