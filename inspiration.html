<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHANYAO | 3D 艺术画廊</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Noto+Serif+SC:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #CC9933;       /* 古董哑光金 */
            --bg-radial: radial-gradient(circle, #252429 0%, #111013 100%);
            --card-base: #1C1B20;
        }
        body { 
            background: var(--bg-radial); 
            overflow: hidden; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            font-family: 'Inter', 'Noto Serif SC', serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* 3D 视界透视 */
        .scene { 
            position: relative; 
            width: 100vw; 
            height: 100vh; 
            perspective: 2000px; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 艺术舞台背景微弱背光光晕 */
        .stage-spotlight {
            position: absolute;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(204, 153, 51, 0.08) 0%, rgba(0,0,0,0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 1;
            border-radius: 50%;
        }

        /* 3D 轮播载体轨道 */
        .carousel { 
            position: absolute; 
            width: 280px; 
            height: 380px; 
            transform-style: preserve-3d; 
            z-index: 5;
        }

        @media (max-width: 640px) {
            .carousel {
                width: 220px;
                height: 300px;
            }
        }

        /* 艺术画卷卡片本体 */
        .card {
            position: absolute; 
            width: 100%; 
            height: 100%;
            background-color: var(--card-base); 
            border-radius: 16px;
            overflow: hidden;
            display: flex; 
            flex-direction: column;
            color: #fff; 
            border: 1px solid rgba(255,255,255,0.06);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.8s cubic-bezier(0.15, 0.85, 0.35, 1), 
                        opacity 0.8s cubic-bezier(0.15, 0.85, 0.35, 1),
                        box-shadow 0.6s ease;
            cursor: pointer;
        }

        /* 高奢磨砂底标 */
        .glass-bottom {
            background: rgba(28, 27, 32, 0.65);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-top: 1px solid rgba(255,255,255,0.08);
            position: absolute;
            bottom: 0;
            width: 100%;
        }

        /* 沉浸聚焦：背景自动变暗遮罩 */
        .backdrop-dim {
            position: fixed;
            inset: 0;
            background: rgba(10, 9, 12, 0.85);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s ease;
            z-index: 10;
        }
        .backdrop-dim.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* 极致对焦放大态 */
        .card.expanded { 
            transform: scale(1.35) translate3d(0, 0, 200px) !important; 
            z-index: 100 !important; 
            cursor: zoom-out; 
            opacity: 1 !important;
            box-shadow: 0 45px 85px -10px rgba(0, 0, 0, 0.85),
                        0 0 0 1px rgba(204, 153, 51, 0.25);
        }

        @media (max-width: 640px) {
            .card.expanded {
                transform: scale(1.15) translate3d(0, 0, 100px) !important;
            }
        }

        /* 关闭按钮：仅在展开时出现 */
        .close-btn {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 32px;
            height: 32px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.1);
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.4s ease;
            z-index: 10;
        }
        .card.expanded .close-btn {
            opacity: 1;
            transform: scale(1);
        }
    </style>
</head>
<body class="selection:bg-neutral-800">

    <!-- 焦点调暗背景 -->
    <div class="backdrop-dim" id="backdropDim"></div>

    <div class="scene" id="scene">
        <!-- 背景聚光灯 -->
        <div class="stage-spotlight"></div>
        
        <!-- 3D 轮播组件 -->
        <div class="carousel" id="carousel"></div>
    </div>

    <!-- 顶部极简品牌指引 -->
    <div class="absolute top-10 left-50% translate-x-[-50%] z-20 text-center pointer-events-none">
        <h2 class="text-[10px] uppercase tracking-[0.4em] text-[#CC9933] font-semibold mb-2">AESTHETIC SCENE</h2>
        <h1 class="text-xl md:text-2xl font-light tracking-[0.25em] text-white/90">SHANYAO GALLERY</h1>
    </div>

    <script>
        const carousel = document.getElementById('carousel');
        const backdropDim = document.getElementById('backdropDim');
        const numCards = 8;
        
        // 适应移动端和桌面端的透视半径
        const radius = window.innerWidth < 640 ? 300 : 450;
        
        let targetRotation = 0;
        let currentRotation = 0;
        let expandedCard = null;

        // 真实高精美学家具物料库
        const mockProducts = [
            { name: "华尔兹极奢岩石柜", price: "18,900", img: "https://images.unsplash.com/photo-1595428774223-ef52624120d2?auto=format&fit=crop&w=800&q=80", tag: "书架", desc: "冷岩肌理与暖光的交融之作。" },
            { name: "奥德赛东方罗汉榻", price: "24,500", img: "https://images.unsplash.com/photo-1505691938895-1758d7feb511?auto=format&fit=crop&w=800&q=80", tag: "卧榻", desc: "在现代极简中蕴藉起居禅意。" },
            { name: "圆舞曲黑檀木茶几", price: "14,800", img: "https://images.unsplash.com/photo-1533090161767-e6ffed986c88?auto=format&fit=crop&w=800&q=80", tag: "茶几", desc: "百年黑檀木，旋切时光年轮。" },
            { name: "雨燕轻奢休闲单椅", price: "4,600", img: "https://images.unsplash.com/photo-1586023492125-27b2c045efd7?auto=format&fit=crop&w=800&q=80", tag: "单椅", desc: "仿生雨燕流线羽翼弧度设计。" },
            { name: "罗浮宫高定绿丝绒椅", price: "5,800", img: "https://images.unsplash.com/photo-1555041469-a586c61ea9bc?auto=format&fit=crop&w=800&q=80", tag: "沙发", desc: "精选罗浮宫古典奢雅暗绿天鹅绒。" },
            { name: "微风意式黑钢边几", price: "3,200", img: "https://images.unsplash.com/photo-1581428982868-e410dd047a90?auto=format&fit=crop&w=800&q=80", tag: "边几", desc: "几何钢架，勾勒纯净空间结构。" },
            { name: "白夜磨砂极简写字台", price: "12,600", img: "https://images.unsplash.com/photo-1540518614846-7eded433c457?auto=format&fit=crop&w=800&q=80", tag: "桌几", desc: "高级亲肤磨砂触感，白夜极简。" },
            { name: "星环高定极简布艺榻", price: "38,500", img: "https://images.unsplash.com/photo-1618221195710-dd6b41faaea6?auto=format&fit=crop&w=800&q=80", tag: "沙发", desc: "星环意象，拥抱纯粹包裹感。" }
        ];

        // 1. 生成画廊卡片
        for (let i = 0; i < numCards; i++) {
            const p = mockProducts[i % mockProducts.length];
            const card = document.createElement('div');
            card.className = 'card';
            card.dataset.index = i;
            
            // 精美高奢排版：全画卷覆盖、左上透白赞数、右上分类、底部极致磨砂指示
            const pseudoLikes = Math.floor(1800 + (i * 350) % 2400);
            card.innerHTML = `
                <div class="relative w-full h-full">
                    <img src="${p.img}" class="w-full h-full object-cover select-none pointer-events-none" loading="lazy">
                    
                    <!-- ✕ 关闭按钮 -->
                    <button class="close-btn"><i data-lucide="x" class="w-4 h-4 text-white/80"></i></button>

                    <!-- 点赞与指数 -->
                    <div class="absolute top-4 left-4 bg-black/30 backdrop-blur-md px-3 py-1 rounded-full text-[10px] text-white/90 flex items-center gap-1">
                        <i data-lucide="heart" class="w-3 h-3 text-[#CC9933]"></i>
                        <span>${pseudoLikes}</span>
                    </div>

                    <!-- 形态类别 -->
                    <div class="absolute top-4 right-4 glass-card px-2.5 py-1 rounded text-[8px] uppercase tracking-[0.2em] font-medium text-[#CC9933]">
                        ${p.tag}
                    </div>

                    <!-- 底部通栏毛玻璃 -->
                    <div class="absolute bottom-0 inset-x-0 glass-bottom p-5 text-white">
                        <p class="text-[8px] uppercase tracking-[0.15em] text-white/40 mb-1">COLLECTION 2026</p>
                        <h3 class="text-sm md:text-base font-normal tracking-wide text-white mb-1.5 leading-snug">${p.name}</h3>
                        <div class="flex justify-between items-baseline gap-2">
                            <p class="text-[10px] text-white/50 font-light truncate max-w-[70%]">${p.desc}</p>
                            <p class="text-xs font-semibold text-[#CC9933]">&yen;${p.price}</p>
                        </div>
                    </div>
                </div>
            `;

            // 点击事件：平滑对焦正前方，然后前置放大
            card.addEventListener('click', (e) => {
                const isClose = e.target.closest('.close-btn');
                
                if (expandedCard === card || isClose) {
                    collapseActiveCard();
                } else {
                    collapseActiveCard(); // 恢复先前的
                    
                    // 1. 旋转计算：将当前卡片优雅地旋流对齐到正前方的角度
                    const angleStep = 360 / numCards;
                    targetRotation = -(i * angleStep);
                    
                    // 2. 赋予变暗背景与展开状态
                    setTimeout(() => {
                        card.classList.add('expanded');
                        backdropDim.classList.add('active');
                        expandedCard = card;
                    }, 150);
                }
                e.stopPropagation();
            });
            carousel.appendChild(card);
        }

        // 统一收缩恢复方法
        function collapseActiveCard() {
            if (expandedCard) {
                expandedCard.classList.remove('expanded');
                backdropDim.classList.remove('active');
                expandedCard = null;
            }
        }

        // 点击空白调暗区域直接收缩卡片
        backdropDim.addEventListener('click', collapseActiveCard);

        // 2. 核心 60FPS 运动插值渲染器（Lerp & Z-Sort）
        function animate() {
            // 平滑插值 (Lerp)：使惯性滑动如水般丝滑
            currentRotation += (targetRotation - currentRotation) * 0.085;
            
            const cards = document.querySelectorAll('.card');
            cards.forEach((card, i) => {
                const angle = (i / numCards) * 360 + currentRotation;
                const rad = (angle * Math.PI) / 180;
                
                const z = Math.cos(rad) * radius;
                const x = Math.sin(rad) * radius;
                
                if (!card.classList.contains('expanded')) {
                    // 远小近大 & 完美的透明度阶梯过渡
                    const scale = (z + radius) / (radius * 2) * 0.45 + 0.55;
                    const opacity = (z + radius) / (radius * 2) * 0.75 + 0.25;
                    
                    card.style.transform = `translateX(${x}px) translateZ(${z}px) rotateY(${-angle}deg) scale(${scale})`;
                    card.style.zIndex = Math.round(z + radius);
                    card.style.opacity = opacity;
                }
            });
            requestAnimationFrame(animate);
        }

        // 3. 完美兼容鼠标与移动端单指轻扫（Touch Sweep Gestures）
        let isDragging = false;
        let lastX = 0;

        function startDrag(clientX) {
            if (!expandedCard) {
                isDragging = true;
                lastX = clientX;
            }
        }

        function moveDrag(clientX) {
            if (!isDragging) return;
            const deltaX = clientX - lastX;
            targetRotation += deltaX * 0.22; // 适中灵敏度阻尼
            lastX = clientX;
        }

        function endDrag() {
            isDragging = false;
        }

        // 鼠标事件绑定
        window.addEventListener('mousedown', e => startDrag(e.clientX));
        window.addEventListener('mousemove', e => moveDrag(e.clientX));
        window.addEventListener('mouseup', endDrag);

        // 移动端手势事件绑定
        window.addEventListener('touchstart', e => startDrag(e.touches[0].clientX));
        window.addEventListener('touchmove', e => moveDrag(e.touches[0].clientX));
        window.addEventListener('touchend', endDrag);

        // 初始化
        animate();
        lucide.createIcons();
    </script>
</body>
</html>
