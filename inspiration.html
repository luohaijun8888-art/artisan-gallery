<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHANYAO | 3D 艺术画廊</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Noto+Serif+SC:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #CC9933;       /* 古董哑光金 */
            --bg-radial: radial-gradient(circle, #252429 0%, #111013 100%);
            --card-base: #1C1B20;
        }
        body { 
            background: var(--bg-radial); 
            overflow: hidden; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            font-family: 'Inter', 'Noto Serif SC', serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* 3D 视界透视 */
        .scene { 
            position: relative; 
            width: 100vw; 
            height: 100vh; 
            perspective: 2000px; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 艺术舞台背景微弱背光光晕 */
        .stage-spotlight {
            position: absolute;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(204, 153, 51, 0.08) 0%, rgba(0,0,0,0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 1;
            border-radius: 50%;
        }

        /* 3D 轮播载体轨道 */
        .carousel { 
            position: absolute; 
            width: 420px; 
            height: 560px; 
            transform-style: preserve-3d; 
            z-index: 5;
        }

        @media (max-width: 640px) {
            .carousel {
                width: 340px;
                height: 460px;
            }
        }

        /* 艺术画卷卡片本体 */
        .card {
            position: absolute; 
            width: 100%; 
            height: 100%;
            background-color: var(--card-base); 
            border-radius: 16px;
            overflow: hidden;
            display: flex; 
            flex-direction: column;
            color: #fff; 
            border: 1px solid rgba(255,255,255,0.06);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.8s cubic-bezier(0.15, 0.85, 0.35, 1), 
                        opacity 0.8s cubic-bezier(0.15, 0.85, 0.35, 1),
                        box-shadow 0.6s ease;
            cursor: pointer;
        }

        /* 高奢极简磨砂底标 - 名字占比小 */
        .glass-bottom {
            background: rgba(28, 27, 32, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.06);
            position: absolute;
            bottom: 0;
            width: 100%;
        }

        /* 沉浸聚焦：背景自动变暗遮罩 */
        .backdrop-dim {
            position: fixed;
            inset: 0;
            background: rgba(10, 9, 12, 0.8);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s ease;
            z-index: 10;
        }
        .backdrop-dim.active {
            opacity: 1;
            pointer-events: auto;
        }

        .glass-header {
            background: rgba(21, 20, 25, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="selection:bg-neutral-800">

    <!-- 焦点调暗背景 -->
    <div class="backdrop-dim" id="backdropDim" onclick="closeDetail()"></div>

    <!-- 顶奢极简返回首页按钮 -->
    <a href="index.html" class="absolute top-6 left-6 md:top-8 md:left-8 z-[70] flex items-center gap-2 text-[10px] uppercase tracking-[0.2em] text-neutral-400 hover:text-white transition-all bg-white/[0.03] hover:bg-white/[0.08] backdrop-blur-md px-4 py-2.5 rounded-full border border-white/[0.06] shadow-lg">
        <i data-lucide="home" class="w-3.5 h-3.5 text-[#CC9933]"></i>
        <span>返回首页</span>
    </a>

    <div class="scene" id="scene">
        <!-- 背景聚光灯 -->
        <div class="stage-spotlight"></div>
        
        <!-- 3D 轮播组件 -->
        <div class="carousel" id="carousel"></div>
    </div>

    <!-- 长条详情页 (Sleek Long Detail Page) -->
    <div id="detailPage" class="fixed inset-y-0 right-0 w-full md:w-[540px] bg-[#151419] z-[150] shadow-2xl translate-x-full transition-transform duration-700 cubic-bezier(0.15, 0.85, 0.35, 1) overflow-y-auto border-l border-white/[0.05] no-scrollbar">
        <!-- 粘性毛玻璃导航栏 -->
        <div class="sticky top-0 z-50 glass-header border-b border-white/[0.05] flex items-center justify-between h-16 px-6">
            <button onclick="closeDetail()" class="flex items-center gap-2 text-xs uppercase tracking-[0.2em] text-neutral-400 hover:text-white transition-colors">
                <i data-lucide="arrow-left" class="w-4 h-4 stroke-[1.5]"></i>
                <span>返回画廊 / BACK</span>
            </button>
            <div class="text-[10px] font-semibold tracking-[0.2em] uppercase text-[#CC9933]" id="detailCategory"></div>
            <div class="w-12"></div>
        </div>

        <!-- 详情内容区 -->
        <div class="pb-24">
            <!-- 巨幕主图 -->
            <div class="w-full aspect-[4/5] overflow-hidden bg-neutral-900 relative">
                <img id="detailHeroImg" src="" alt="Hero Image" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-[#151419] via-transparent to-transparent"></div>
            </div>

            <!-- 文字叙事与奢华参数 -->
            <div class="px-8 pt-6 space-y-6">
                <div>
                    <h1 class="text-2xl md:text-3xl font-light tracking-wider text-white mb-2 font-serif" id="detailTitle"></h1>
                    <p class="text-xl font-light text-[#CC9933] tracking-wide" id="detailPrice"></p>
                </div>

                <div class="border-t border-white/[0.05] pt-6 space-y-4">
                    <p class="text-[11px] uppercase tracking-[0.2em] text-neutral-500 font-semibold">设计哲学 / PHILOSOPHY</p>
                    <p class="text-sm text-neutral-300 leading-relaxed font-light" id="detailDesc"></p>
                </div>

                <!-- 尊享特权背书 -->
                <div class="bg-white/[0.01] border border-white/[0.03] p-5 rounded-lg space-y-4 text-xs text-neutral-400 font-light leading-relaxed">
                    <div class="flex gap-3">
                        <span class="text-[#CC9933]">✦</span>
                        <div>
                            <p class="font-normal text-white mb-0.5">物料质感基因</p>
                            <p class="text-[11px] text-neutral-500">精选特级木材与天然矿物涂料，辅以东方榫卯结构与高密度天然油脂防护。</p>
                        </div>
                    </div>
                    <div class="flex gap-3">
                        <span class="text-[#CC9933]">✦</span>
                        <div>
                            <p class="font-normal text-white mb-0.5">专线尊享物流</p>
                            <p class="text-[11px] text-neutral-500">高强度气相防震包装定制，尊享全国全境专人安装及全保价无忧托运服务。</p>
                        </div>
                    </div>
                </div>

                <!-- 空间场景长图解说 -->
                <div class="pt-8 space-y-6">
                    <div class="text-center">
                        <p class="text-[9px] uppercase tracking-[0.3em] text-[#CC9933] font-semibold mb-1">SCENARIO DETAILS</p>
                        <h3 class="text-xs font-light tracking-widest text-neutral-500">— 空间延展图卷 —</h3>
                    </div>
                    <div class="space-y-4" id="detailWaterfall">
                        <!-- 动态生成的空间细节长图 -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 顶部极简品牌指引 -->
    <div class="absolute top-10 left-50% translate-x-[-50%] z-20 text-center pointer-events-none">
        <h2 class="text-[10px] uppercase tracking-[0.4em] text-[#CC9933] font-semibold mb-2">AESTHETIC SCENE</h2>
        <h1 class="text-xl md:text-2xl font-light tracking-[0.25em] text-white/90">SHANYAO GALLERY</h1>
    </div>

    <script>
        const carousel = document.getElementById('carousel');
        const backdropDim = document.getElementById('backdropDim');
        
        // 动态半径：根据产品数量自动调整，保持间隔不变
        function calculateRadius() {
            const baseRadius = window.innerWidth < 640 ? 480 : 680;
            // 间隔加大2倍：基础半径乘以2
            // 产品数量增加时，自动增大半径以保持间隔
            const scaleFactor = Math.max(1, numCards / 6);
            return baseRadius * scaleFactor;
        }
        
        let radius = calculateRadius();
        
        let targetRotation = 0;
        let currentRotation = 0;
        let isDetailOpen = false;

        // GitHub 核心数据管道绑定与缓存提取
        const GITHUB_REPO = "luohaijun8888-art/artisan-gallery";
        const GITHUB_API = "https://api.github.com/repos/" + GITHUB_REPO + "/contents/products.json";
        const _tk = ['github_pat_11CCANEGA0','oHmccUGuDviI_5Ct5X','ZQSxg7bz0OPa3Z8PX','Vg9vRIxbP3VlVVozYQ','9c3Y5XKVFXTEMf9Ukrr'];
        const EMBEDDED_TOKEN = _tk.join('');
        
        let categories = ["餐台", "茶几", "餐椅", "床", "书架"];
        let allProducts = [];
        let inspirationProducts = [];
        let numCards = 0;

        // --- 核心：拉取您在灵感页（Inspiration.html）中添加的真实图片和内容 ---
        async function fetchProducts() {
            try {
                const headers = { 'Accept': 'application/vnd.github+json', 'X-GitHub-Api-Version': '2022-11-28' };
                if (EMBEDDED_TOKEN) headers['Authorization'] = 'Bearer ' + EMBEDDED_TOKEN;
                const res = await fetch(GITHUB_API, { headers, cache: 'no-store' });
                if (!res.ok) throw new Error('拉取失败');
                const data = await res.json();
                const content = JSON.parse(decodeURIComponent(escape(atob(data.content))));
                allProducts = content.products || [];
            } catch(e) {
                // 若由于网络限流等原因无法获取云端接口，自动安全降级至 localStorage 读取
                allProducts = JSON.parse(localStorage.getItem('furniture_gallery_db')) || [];
            }
            
            // 过滤 page === '灵感' 的物料数据
            inspirationProducts = allProducts.filter(p => (p.page || '首页') === '灵感');
            
            // 兜底机制：万一库中还没有上传任何灵感画卡，渲染三款高定图卡支撑空间
            if(inspirationProducts.length === 0) {
                inspirationProducts = [
                    { 
                        name: "华尔兹极奢岩石柜", 
                        price: "18,900", 
                        images: ["https://images.unsplash.com/photo-1595428774223-ef52624120d2?auto=format&fit=crop&w=800&q=80"], 
                        category: "书架", 
                        description: "极致利落骨骼与冷岩肌理交融，在晨昏间捕捉流光艺术投影。" 
                    },
                    { 
                        name: "奥德赛东方罗汉榻", 
                        price: "24,500", 
                        images: ["https://images.unsplash.com/photo-1505691938895-1758d7feb511?auto=format&fit=crop&w=800&q=80"], 
                        category: "床", 
                        description: "古典骨架融合现代极简泡棉工艺，勾勒悠远清雅的起居禅意境象。" 
                    },
                    { 
                        name: "圆舞曲黑檀木茶几", 
                        price: "14,800", 
                        images: ["https://images.unsplash.com/photo-1533090161767-e6ffed986c88?auto=format&fit=crop&w=800&q=80"], 
                        category: "茶几", 
                        description: "精选百年高密度黑檀木纯手工旋切，轮纹深邃，留驻大地诗篇。" 
                    }
                ];
            }

            numCards = inspirationProducts.length;
            // 产品数量变化后，重新计算半径
            radius = calculateRadius();
            renderDynamicCards();
        }

        // 动态生成和绑定卡片
        function renderDynamicCards() {
            carousel.innerHTML = '';
            
            inspirationProducts.forEach((p, i) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.index = i;
                
                // 名字占比缩小 2/3 (py-2.5 px-3，极其精细)
                card.innerHTML = `
                    <div class="relative w-full h-full">
                        <img src="${p.images[0] || p.img}" class="w-full h-full object-cover select-none pointer-events-none" loading="lazy">
                        
                        <!-- 形态类别 -->
                        <div class="absolute top-4 right-4 glass-card px-2.5 py-1 rounded text-[8px] uppercase tracking-[0.2em] font-medium text-[#CC9933]">
                            ${p.category || p.tag}
                        </div>

                        <!-- 极其扁平高定底标 -->
                        <div class="absolute bottom-0 inset-x-0 glass-bottom py-2.5 px-3 text-center text-white">
                            <h3 class="text-[10px] md:text-xs font-light tracking-[0.15em] text-white/90 truncate leading-snug">${p.name}</h3>
                        </div>
                    </div>
                `;

                // 点击事件判定 (区分滑动与轻击)
                card.addEventListener('click', (e) => {
                    // 如果在按下后产生了显著的位移，说明是滑动，不执行点击弹出
                    if (totalDragDist > 8) {
                        return;
                    }
                    
                    const angleStep = 360 / numCards;
                    targetRotation = -(i * angleStep);
                    
                    openDetailPage(p);
                    e.stopPropagation();
                });
                carousel.appendChild(card);
            });
        }

        // 打开长详情页
        function openDetailPage(p) {
            document.getElementById('detailTitle').textContent = p.name;
            document.getElementById('detailPrice').textContent = '¥ ' + Number(p.price).toLocaleString();
            document.getElementById('detailCategory').textContent = `COLLECTION / ${p.category || p.tag}`;
            
            const heroImgUrl = p.images ? p.images[0] : p.img;
            document.getElementById('detailHeroImg').src = heroImgUrl;
            document.getElementById('detailDesc').textContent = (p.description || p.desc || "") + "。该作品融合了空间深度的多维表达，通过利落的物理线条与温润的手作触感相呼应，使其在任何角度下都流露出静止的诗意与艺术张力。";
            
            // 空间图卷瀑布流
            const waterfall = document.getElementById('detailWaterfall');
            const detailImgs = p.detailImages && p.detailImages.length ? p.detailImages : (p.images ? p.images : [heroImgUrl]);
            
            waterfall.innerHTML = detailImgs.map(img => `
                <img src="${img}" class="w-full h-auto rounded-lg object-cover shadow-lg mb-4" loading="lazy">
            `).join('');
            
            document.getElementById('detailPage').classList.remove('translate-x-full');
            document.getElementById('detailPage').classList.add('translate-x-0');
            backdropDim.classList.add('active');
            isDetailOpen = true;
        }

        // 关闭长详情页
        window.closeDetail = function() {
            document.getElementById('detailPage').classList.remove('translate-x-0');
            document.getElementById('detailPage').classList.add('translate-x-full');
            backdropDim.classList.remove('active');
            isDetailOpen = false;
        }

        // 2. 核心 60FPS 运动插值渲染器（Lerp & Z-Sort）
        function animate() {
            if (numCards > 0) {
                // 平滑插值 (Lerp)：使惯性滑动如水般丝滑
                currentRotation += (targetRotation - currentRotation) * 0.085;
                
                const cards = document.querySelectorAll('.card');
                cards.forEach((card, i) => {
                    const angle = (i / numCards) * 360 + currentRotation;
                    const rad = (angle * Math.PI) / 180;
                    
                    const z = Math.cos(rad) * radius;
                    const x = Math.sin(rad) * radius;
                    
                    // 透视阶梯过渡
                    const scale = (z + radius) / (radius * 2) * 0.45 + 0.55;
                    // 恢复透明度：所有卡片完全不透明
                    const opacity = 1;
                    
                    card.style.transform = `translateX(${x}px) translateZ(${z}px) rotateY(${-angle}deg) scale(${scale})`;
                    card.style.zIndex = Math.round(z + radius);
                    card.style.opacity = opacity;
                });
            }
            requestAnimationFrame(animate);
        }

        // 4. 自动缓慢旋转 - 持续缓慢转动画廊
        let autoRotateSpeed = 0.08; // 每帧增加的旋转角度（越小越慢）
        let lastAutoTime = performance.now();
        
        function tickAutoRotate(now) {
            const dt = now - lastAutoTime;
            lastAutoTime = now;
            // 当详情页打开或用户正在拖拽时暂停自动旋转
            if (!isDetailOpen && !isDragging) {
                targetRotation += autoRotateSpeed * (dt / 16.67); // 归一化到60fps
            }
            requestAnimationFrame(tickAutoRotate);
        }
        requestAnimationFrame(tickAutoRotate);

        // 3. 兼容鼠标与移动端单指轻扫手势，带精准位移计算
        let isDragging = false;
        let lastX = 0;
        let totalDragDist = 0; 

        function startDrag(clientX) {
            if (!isDetailOpen) {
                isDragging = true;
                lastX = clientX;
                totalDragDist = 0; 
            }
        }

        function moveDrag(clientX) {
            if (!isDragging) return;
            const deltaX = clientX - lastX;
            targetRotation += deltaX * 0.22; 
            totalDragDist += Math.abs(deltaX); 
            lastX = clientX;
        }

        function endDrag() {
            isDragging = false;
        }

        // 鼠标事件绑定
        window.addEventListener('mousedown', e => startDrag(e.clientX));
        window.addEventListener('mousemove', e => moveDrag(e.clientX));
        window.addEventListener('mouseup', endDrag);

        // 移动端手势事件绑定
        window.addEventListener('touchstart', e => startDrag(e.touches[0].clientX));
        window.addEventListener('touchmove', e => moveDrag(e.touches[0].clientX));
        window.addEventListener('touchend', endDrag);

        // 初始化
        fetchProducts();
        animate();
        lucide.createIcons();
    </script>
</body>
</html>
