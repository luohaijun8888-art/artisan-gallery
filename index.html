body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overscroll-behavior:none}

.no-scrollbar::-webkit-scrollbar{display:none}.no-scrollbar{-ms-overflow-style:none;scrollbar-width:none}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.save-indicator{position:fixed;bottom:20px;right:20px;z-index:200;padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;opacity:0;transition:opacity .3s}

.carousel-track{display:flex;transition:transform .4s cubic-bezier(.16,1,.3,1)}
.carousel-track img{flex-shrink:0;width:100%;aspect-ratio:1/1;object-fit:contain;background:#f5f5f3}
.carousel-dots{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:6px}
.carousel-dot{width:6px;height:6px;border-radius:50%;background:rgba(0,0,0,.2);transition:all .3s}
.carousel-dot.active{background:var(--text);width:18px;border-radius:3px}
.variant-btn{padding:6px 14px;border:1px solid #e5e5e5;border-radius:4px;font-size:12px;cursor:pointer;transition:all .2s;background:#fff}
.variant-btn.active{border-color:var(--text);background:var(--text);color:#fff}
.variant-btn:hover:not(.active){border-color:#999}
.thumb-row{display:flex;gap:8px;overflow-x:auto;padding:8px 0}
.thumb-row img{width:56px;height:56px;object-fit:cover;border-radius:4px;border:2px solid transparent;cursor:pointer;flex-shrink:0;transition:border-color .2s}

.mobile-nav { display: none; }
@media (max-width:768px) { .mobile-nav { display: flex; position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.95); backdrop-filter: blur(20px); border-top: 1px solid rgba(0,0,0,0.05); z-index: 100; padding: 8px 0; padding-bottom: calc(8px + env(safe-area-inset-bottom)); } .mobile-nav a { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 8px 0; font-size: 10px; font-weight: 600; opacity: 0.5; transition: all 0.2s; } .mobile-nav a.active { opacity: 1; color: var(--accent); } .mobile-nav a i { width: 22px; height: 22px; } }
body { padding-bottom: 70px; }
@media (min-width:769px) { body { padding-bottom: 0; } }

<script>
const GITHUB_REPO="luohaijun8888-art/artisan-gallery";
const GITHUB_API="https://api.github.com/repos/"+GITHUB_REPO+"/contents/products.json";
const _tk=['github_pat_11CCANEGA0','oHmccUGuDviI_5Ct5X','ZQSxg7bz0OPa3Z8PX','Vg9vRIxbP3VlVVozYQ','9c3Y5XKVFXTEMf9Ukrr'];
const EMBEDDED_TOKEN=_tk.join('');
if(localStorage.getItem('gh_token')&&localStorage.getItem('gh_token')!==EMBEDDED_TOKEN){localStorage.removeItem('gh_token');}
let githubToken=EMBEDDED_TOKEN;
let dataSha=null;
const adminPassword="8888";
let isAuthenticated=false;
let categories=["椁愬彴","鑼跺嚑","椁愭","搴?,"瀛︿範妗?];
let products=[];
let currentCategory='all',currentSearch='';
let currentDetail=null,currentVariantIdx=0,carouselIdx=0;
let editingId=null;

function showSaveStatus(s,m){const e=document.getElementById('saveIndicator');e.className='save-indicator '+s;e.textContent=m;setTimeout(()=>{e.className='save-indicator';},2500)}

// --- GitHub API ---
async function fetchProducts(){
  try{
    const h={'Accept':'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28'};
    if(githubToken)h['Authorization']='Bearer '+githubToken;
    const r=await fetch(GITHUB_API,{headers:h});
    if(!r.ok)throw new Error('fetch failed');
    const d=await r.json();dataSha=d.sha;
    const c=JSON.parse(decodeURIComponent(escape(atob(d.content))));
    categories=c.categories||categories;products=c.products||[];
    localStorage.setItem('artisan_categories',JSON.stringify(categories));
    localStorage.setItem('furniture_gallery_db',JSON.stringify(products));
  }catch(e){
    console.warn('fetch failed, using cache',e);
    categories=JSON.parse(localStorage.getItem('artisan_categories'))||categories;
    products=JSON.parse(localStorage.getItem('furniture_gallery_db'))||[];
  }
  renderCategories();renderProducts();
}

async function saveToGitHub(){
  if(!githubToken){showSaveStatus('error','鏈缃甌oken');return}
  showSaveStatus('saving','鍚屾涓?..');
  try{
    const h={'Authorization':'Bearer '+githubToken,'Accept':'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28'};
    const hr=await fetch(GITHUB_API,{headers:h});
    if(hr.ok){const d=await hr.json();dataSha=d.sha}
    const content=btoa(unescape(encodeURIComponent(JSON.stringify({categories,products},null,2))));
    const body={message:'update '+new Date().toISOString(),content,sha:dataSha};
    const r=await fetch(GITHUB_API,{method:'PUT',headers:{...h,'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(r.status===401){showSaveStatus('error','Token宸插け鏁?);const t=prompt('Token宸插け鏁堬紝璇疯緭鍏ユ柊Token锛?);if(t){githubToken=t.trim();localStorage.setItem('gh_token',githubToken);await saveToGitHub()}return}
    if(r.status===409){dataSha=null;await saveToGitHub();return}
    if(!r.ok){const e=await r.text();throw new Error('HTTP '+r.status)}
    const res=await r.json();dataSha=res.content.sha;showSaveStatus('saved','宸插悓姝ュ埌浜戠');
  }catch(e){showSaveStatus('error','鍚屾澶辫触: '+e.message)}
  localStorage.setItem('artisan_categories',JSON.stringify(categories));
  localStorage.setItem('furniture_gallery_db',JSON.stringify(products));
}
async function saveAll(){await saveToGitHub()}

// --- Auth ---
window.handleAdminAccess=function(){if(isAuthenticated){toggleAdminModal()}else{document.getElementById('authOverlay').classList.remove('hidden');document.getElementById('adminPasswordInput').focus()}};
window.closeAuth=function(){document.getElementById('authOverlay').classList.add('hidden');document.getElementById('adminPasswordInput').value='';document.getElementById('authError').classList.add('hidden')};
window.verifyAdmin=function(){const i=document.getElementById('adminPasswordInput');if(i.value===adminPassword){isAuthenticated=true;closeAuth();toggleAdminModal()}else{document.getElementById('authError').classList.remove('hidden');i.value='';i.focus()}};
document.getElementById('adminPasswordInput').onkeypress=e=>{if(e.key==='Enter')verifyAdmin()};

// --- Render ---
window.setCategory=function(c){currentCategory=c;renderCategories();renderProducts()};
function renderCategories(){
  const el=document.getElementById('categoryContainer');if(!el)return;
  let h='<button onclick="setCategory(\'all\')" class="category-pill '+(currentCategory==='all'?'active':'')+' px-5 md:px-8 py-2 md:py-3 rounded-full bg-white text-[11px] md:text-sm font-medium">鍏ㄩ儴</button>';
  h+=categories.map(c=>'<button onclick="setCategory(\''+c+'\')" class="category-pill '+(currentCategory===c?'active':'')+' px-5 md:px-8 py-2 md:py-3 rounded-full bg-white text-[11px] md:text-sm font-medium hover:bg-black/5">'+c+'</button>').join('');
  el.innerHTML=h;
  const sel=document.getElementById('p_category');if(sel)sel.innerHTML=categories.map(c=>'<option value="'+c+'">'+c+'</option>').join('');
  const acl=document.getElementById('adminCatList');
  if(acl){acl.innerHTML=categories.map(c=>'<div class="flex items-center gap-2 bg-black/5 px-3 py-1.5 rounded-full text-xs font-medium group"><span>'+c+'</span><button onclick="removeCategory(\''+c+'\')" class="opacity-40 group-hover:opacity-100 hover:text-red-500"><i data-lucide="x" class="w-3 h-3"></i></button></div>').join('');lucide.createIcons()}
}

function getMainImage(p){
  if(p.variants&&p.variants.length)return p.variants[0].images[0];
  return p.images?p.images[0]:'';
}

function renderProducts(){
  const grid=document.getElementById('productGrid');
  const filtered=products.filter(p=>(currentCategory==='all'||p.category===currentCategory)&&p.name.toLowerCase().includes(currentSearch.toLowerCase())&&p.page!=='鐏垫劅');
  if(!filtered.length){grid.innerHTML='<div class="col-span-full py-20 text-center opacity-30 text-sm italic">鏈壘鍒扮浉鍏充綔鍝?/div>';return}
  grid.innerHTML=filtered.map((p,idx)=>{
    const variantCount=p.variants?p.variants.length:0;
    const badge=variantCount>1?variantCount+'鑹插彲閫?:(p.tags||'');
    return '<div class="product-card cursor-pointer group fade-up" style="animation-delay:'+idx*0.04+'s" onclick="openDetail('+p.id+')">'+
    '<div class="product-image-container aspect-square md:aspect-[4/5] relative mb-3">'+
    (badge?'<span class="absolute top-2 left-2 z-10 bg-white px-2 py-0.5 text-[8px] font-bold tracking-widest uppercase shadow-sm rounded">'+badge+'</span>':'')+
    '<img src="'+getMainImage(p)+'" class="product-image w-full h-full object-cover" loading="lazy">'+
    '</div>'+
    '<div class="px-0.5"><p class="text-[8px] uppercase tracking-[.15em] opacity-40 font-bold mb-0.5">'+p.category+'</p>'+
    '<h3 class="text-xs md:text-sm serif font-medium truncate">'+p.name+'</h3>'+
    '<p class="text-xs opacity-50 mt-0.5">楼'+Number(p.price).toLocaleString()+'</p></div></div>';
  }).join('');
  lucide.createIcons();
}

// --- Detail page (Taobao style) ---
window.openDetail=function(id){
  const p=products.find(x=>x.id===id);if(!p)return;
  currentDetail=p;currentVariantIdx=0;carouselIdx=0;
  document.getElementById('homePage').classList.add('hidden');
  document.getElementById('detailPage').classList.remove('hidden');
  document.getElementById('detailTopTitle').textContent=p.category;
  window.scrollTo(0,0);
  renderDetail();
};
window.closeDetail=function(){
  document.getElementById('detailPage').classList.add('hidden');
  document.getElementById('homePage').classList.remove('hidden');
  currentDetail=null;
};

function getCurrentImages(){
  if(!currentDetail)return[];
  if(currentDetail.variants&&currentDetail.variants.length){
    return currentDetail.variants[currentVariantIdx].images||[];
  }
  return currentDetail.images||[];
}

function renderDetail(){
  const p=currentDetail;if(!p)return;
  document.getElementById('detailName').textContent=p.name;
  document.getElementById('detailPrice').textContent='楼'+Number(p.price).toLocaleString();
  document.getElementById('detailOrigPrice').textContent='楼'+Math.round(Number(p.price)*1.5).toLocaleString();
  document.getElementById('detailDesc').textContent=p.description||'';
  // Variants
  const vs=document.getElementById('variantSection');
  if(p.variants&&p.variants.length>1){
    vs.classList.remove('hidden');
    document.getElementById('variantLabel').textContent='棰滆壊/瑙勬牸';
    document.getElementById('variantBtns').innerHTML=p.variants.map((v,i)=>
      '<button class="variant-btn '+(i===currentVariantIdx?'active':'')+'" onclick="selectVariant('+i+')">'+v.name+'</button>'
    ).join('');
  }else{vs.classList.add('hidden')}
  // Carousel
  renderCarousel();
  // Detail images
  const di=document.getElementById('detailImages');
  if(p.detailImages&&p.detailImages.length){
    di.innerHTML=p.detailImages.map(u=>'<img src="'+u+'" loading="lazy">').join('');
  }else{di.innerHTML=''}
  lucide.createIcons();
}

function renderCarousel(){
  const imgs=getCurrentImages();
  const track=document.getElementById('carouselTrack');
  const dots=document.getElementById('carouselDots');
  if(!imgs.length){track.innerHTML='';dots.innerHTML='';return}
  if(carouselIdx>=imgs.length)carouselIdx=0;
  track.innerHTML=imgs.map(u=>'<img src="'+u+'" loading="lazy">').join('');
  track.style.transform='translateX(-'+carouselIdx*100+'%)';
  dots.innerHTML=imgs.map((_,i)=>'<div class="carousel-dot '+(i===carouselIdx?'active':'')+'"></div>').join('');
  // Thumbnails
  const tr=document.getElementById('thumbRow');
  tr.innerHTML=imgs.map((u,i)=>'<img src="'+u+'" class="'+(i===carouselIdx?'active':'')+'" onclick="goCarousel('+i+')">').join('');
  // Touch/swipe
  initCarouselSwipe();
}

window.selectVariant=function(i){
  currentVariantIdx=i;carouselIdx=0;renderDetail();
};

window.goCarousel=function(i){carouselIdx=i;renderCarousel()};

function initCarouselSwipe(){
  const wrap=document.getElementById('carouselWrap');
  let sx=0,moving=false;
  wrap.ontouchstart=e=>{sx=e.touches[0].clientX;moving=true};
  wrap.ontouchend=e=>{
    if(!moving)return;moving=false;
    const dx=e.changedTouches[0].clientX-sx;
    const imgs=getCurrentImages();
    if(dx<-40&&carouselIdx<imgs.length-1)carouselIdx++;
    else if(dx>40&&carouselIdx>0)carouselIdx--;
    renderCarousel();
  };
}

window.toggleAdminModal=function(){
  const m=document.getElementById('adminModal'),s=document.getElementById('adminSidebar');

window.addProduct=function(){
  const name=document.getElementById('p_name').value.trim();
  const desc=document.getElementById('p_desc').value.trim();
  const price=document.getElementById('p_price').value;
  const tags=document.getElementById('p_tags').value.trim();
  const imgs=Array.from(document.querySelectorAll('.img-input')).map(i=>i.value).filter(v=>v);
  const detailImgs=Array.from(document.querySelectorAll('.detail-img-input')).map(i=>i.value).filter(v=>v);
  const variantText=document.getElementById('p_variants').value.trim();
  if(!name||!price)return alert('淇℃伅涓嶅畬鏁?);
  const prod={id:Date.now(),name,description:desc,price,category:document.getElementById('p_category').value,page:document.getElementById('p_page').value,tags:tags||'NEW',images:imgs,detailImages:detailImgs};
  // Parse variants
  if(variantText){
    const vNames=variantText.split('\n').map(s=>s.trim()).filter(Boolean);
    prod.variants=vNames.map((vn,i)=>({name:vn,images:imgs.length?[imgs[i%imgs.length]]:[]}));
    prod.images=imgs; // keep main images for backward compat
  }
  products.unshift(prod);saveAll();renderProducts();toggleAdminModal();
};

function renderEditForm(p){
  return '<div class="p-4 bg-yellow-50/50 border border-yellow-200/50 rounded-lg space-y-3 fade-up">'+
  '<div class="flex justify-between items-center mb-2"><span class="text-[10px] font-bold text-yellow-700 uppercase tracking-widest">缂栬緫妯″紡</span>'+
  '<div class="flex gap-2"><button onclick="cancelEdit()" class="text-xs px-3 py-1 border rounded">鍙栨秷</button><button onclick="saveEdit('+p.id+')" class="text-xs px-3 py-1 bg-black text-white rounded">淇濆瓨</button></div></div>'+
  '<input id="edit_name" value="'+p.name+'" class="w-full border-b py-2 text-sm outline-none bg-transparent" placeholder="鍚嶇О">'+
  '<textarea id="edit_desc" class="w-full border-b py-2 text-sm outline-none bg-transparent resize-none" rows="2" placeholder="鎻忚堪">'+(p.description||'')+'</textarea>'+
  '<div class="grid grid-cols-2 gap-3">'+
  '<select id="edit_cat" class="border-b py-2 outline-none bg-transparent text-sm">'+categories.map(c=>'<option value="'+c+'" '+(c===p.category?'selected':'')+'>'+c+'</option>').join('')+'</select>'+
  '<input id="edit_price" value="'+p.price+'" class="border-b bg-transparent py-2 outline-none text-sm" placeholder="浠锋牸">'+
  '</div>'+
  '<div class="grid grid-cols-2 gap-3">'+
  '<select id="edit_page" class="border-b py-2 outline-none bg-transparent text-sm"><option value="棣栭〉" '+(p.page!=='鐏垫劅'?'selected':'')+'>棣栭〉</option><option value="鐏垫劅" '+(p.page==='鐏垫劅'?'selected':'')+'>鐏垫劅</option></select>'+
  '<input id="edit_tags" value="'+(p.tags||'')+'" class="border-b bg-transparent py-2 outline-none text-sm" placeholder="鏍囩">'+
  '</div>'+
  // Variants editing
  '<div><p class="text-xs font-bold opacity-60 mb-2">棰滆壊/瑙勬牸</p><div id="edit_variants" class="space-y-2">'+
  (p.variants?p.variants.map((v,i)=>'<div class="flex gap-2 items-center"><input value="'+v.name+'" class="flex-1 border-b bg-transparent py-1 text-xs outline-none edit-variant-name" placeholder="棰滆壊鍚?><span class="text-[10px] opacity-40">('+v.images.length+'鍥?</span><button onclick="this.parentElement.remove()" class="text-red-400 text-xs">鉁?/button></div>').join(''):'')+
  '</div><button onclick="addEditVariant()" class="text-[10px] font-bold opacity-40 hover:opacity-100 mt-1">+ 娣诲姞棰滆壊</button></div>'+
  // Images editing
  '<div><p class="text-xs font-bold opacity-60 mb-2">涓诲浘閾炬帴</p><div id="edit_images" class="space-y-2">'+
  (p.images||[]).map(img=>'<div class="flex gap-2"><input value="'+img+'" class="w-full border-b bg-transparent py-1 text-xs outline-none edit-img-input"><button onclick="this.parentElement.remove()" class="text-red-400 text-xs">鉁?/button></div>').join('')+
  '</div><button onclick="addEditImageInput()" class="text-[10px] font-bold opacity-40 hover:opacity-100 mt-1">+ 娣诲姞涓诲浘</button></div>'+
  // Detail images editing
  '<div><p class="text-xs font-bold opacity-60 mb-2">璇︽儏鍥鹃摼鎺?/p><div id="edit_detail_images" class="space-y-2">'+
  (p.detailImages||[]).map(img=>'<div class="flex gap-2"><input value="'+img+'" class="w-full border-b bg-transparent py-1 text-xs outline-none edit-detail-img-input"><button onclick="this.parentElement.remove()" class="text-red-400 text-xs">鉁?/button></div>').join('')+

window.saveEdit=function(id){
  const p=products.find(x=>x.id===id);if(!p)return;
  p.name=document.getElementById('edit_name').value.trim();
  p.description=document.getElementById('edit_desc').value.trim();
  p.price=document.getElementById('edit_price').value;
  p.category=document.getElementById('edit_cat').value;
  p.page=document.getElementById('edit_page').value;
  p.tags=document.getElementById('edit_tags').value;
  const imgs=Array.from(document.querySelectorAll('.edit-img-input')).map(i=>i.value).filter(v=>v);
  if(imgs.length)p.images=imgs;
  const detailImgs=Array.from(document.querySelectorAll('.edit-detail-img-input')).map(i=>i.value).filter(v=>v);
  p.detailImages=detailImgs;
  // Update variants
  const vNames=Array.from(document.querySelectorAll('.edit-variant-name')).map(i=>i.value.trim()).filter(Boolean);
  if(vNames.length){
    if(!p.variants)p.variants=[];
    // Keep existing variant images where names match, create new for new names
    const oldMap={};p.variants.forEach(v=>oldMap[v.name]=v.images);
    p.variants=vNames.map(n=>({name:n,images:oldMap[n]||[p.images[0]||'']}));
  }
  editingId=null;saveAll();renderAdminList();renderProducts();
};

window.exportToExcel=function(){
  let csv="\uFEFF浣滃搧鍚嶇О,鍒嗙被,浠锋牸,鎻忚堪,鏍囩,椤甸潰,棰滆壊(鍒嗗彿鍒嗛殧),涓诲浘(鍒嗗彿鍒嗛殧),璇︽儏鍥?鍒嗗彿鍒嗛殧)\n";
  products.forEach(p=>{
    csv+='"'+p.name+'","'+p.category+'","'+p.price+'","'+(p.description||'')+'","'+(p.tags||'')+'","'+(p.page||'棣栭〉')+'","'+(p.variants?p.variants.map(v=>v.name).join(';'):'')+'","'+(p.images||[]).join(';')+'","'+(p.detailImages||[]).join(';')+'"\n';
  });
  const b=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const l=document.createElement('a');l.href=URL.createObjectURL(b);l.download='Artisan_Export_'+new Date().toISOString().slice(0,10)+'.csv';l.click();
};
window.importFromExcel=function(event){
  const file=event.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    const rows=e.target.result.split('\n').slice(1);
    const existing=new Set(products.map(p=>p.name));let imported=0;
    rows.forEach(row=>{
      const cols=row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
      if(cols&&cols.length>=3){
        const clean=s=>s.replace(/^"|"$/g,'').trim();
        const name=clean(cols[0]);
        if(!existing.has(name)){
          const cat=clean(cols[1]);
          const imgs=cols[7]?clean(cols[7]).split(';').filter(Boolean):[];
          const detailImgs=cols[8]?clean(cols[8]).split(';').filter(Boolean):[];
          const vNames=cols[6]?clean(cols[6]).split(';').filter(Boolean):[];
          const prod={id:Date.now()+imported,name,category:cat,price:clean(cols[2]),description:cols[3]?clean(cols[3]):'',tags:cols[4]?clean(cols[4]):'NEW',page:cols[5]?clean(cols[5]):'棣栭〉',images:imgs,detailImages:detailImgs};
          if(vNames.length){prod.variants=vNames.map((n,i)=>({name:n,images:[imgs[i%imgs.length]||'']}))}
          products.unshift(prod);if(!categories.includes(cat))categories.push(cat);imported++;existing.add(name);
        }
      }
    });
    if(imported>0){saveAll();renderCategories();renderProducts();alert('瀵煎叆'+imported+'涓?)}else alert('鏃犳柊鏁版嵁');
    event.target.value='';
  };reader.readAsText(file);
};

document.getElementById('searchInput').oninput=e=>{currentSearch=e.target.value;renderProducts()};
