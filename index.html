<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHANYAO | 闪耀家具图册</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Noto+Serif+SC:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root { 
            --accent: #CC9933;       /* 古董哑光金 */
            --bg: #FBFBFA;           /* 质感象牙白 */
            --text-main: #161615;    /* 沉稳高定黑 */
            --text-muted: #8A8A85;   /* 诗意岩石灰 */
        }
        body { 
            font-family: 'Inter', 'Noto Serif SC', serif; 
            background-color: var(--bg); 
            color: var(--text-main); 
            scroll-behavior: smooth; 
            -webkit-tap-highlight-color: transparent;
            padding-bottom: 80px;
        }
        @media (min-width: 769px) { body { padding-bottom: 0; } }
        
        .serif-title { font-family: 'Cinzel', 'Noto Serif SC', serif; tracking: 0.05em; }
        .glass { background: rgba(251, 251, 250, 0.85); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); }
        
        /* --- 核心重构：艺术级瀑布流 (Masonry Layout) ---
           以图片实际宽度为基准，高度自由生长，绝不留多余白边
        */
        .masonry-grid {
            column-count: 1;
            column-gap: 1.5rem;
            width: 100%;
        }
        @media (min-width: 640px) {
            .masonry-grid {
                column-count: 2;
                column-gap: 2rem;
            }
        }
        @media (min-width: 1024px) {
            .masonry-grid {
                column-count: 3;
                column-gap: 2.5rem;
            }
        }
        
        /* 瀑布流单体卡片：防止跨列折断，形成独立流块 */
        .masonry-item {
            break-inside: avoid;
            display: inline-block;
            width: 100%;
            margin-bottom: 2.5rem; /* 卡片间距 */
        }

        .product-card { transition: all 0.6s cubic-bezier(0.15, 0.85, 0.35, 1); }
        @media (hover: hover) { 
            .product-card:hover { transform: translateY(-4px); }
            .product-card:hover .product-image { transform: scale(1.03); opacity: 0.95; }
        }
        
        /* 去除固定比例比例裁剪，让图片以自然高度呈现 */
        .product-image-container { 
            overflow: hidden; 
            background: #F3F3F1; 
            border-radius: 8px; /* 柔和倒角 */
            box-shadow: 0 4px 20px -10px rgba(0,0,0,0.03);
            transition: box-shadow 0.6s ease;
        }
        .product-card:hover .product-image-container {
            box-shadow: 0 16px 40px -10px rgba(204,153,51,0.08);
        }
        .product-image { 
            transition: transform 1.2s cubic-bezier(0.15, 0.85, 0.35, 1), opacity 0.4s ease; 
            width: 100%;
            height: auto;
            display: block; /* 杜绝底部间隙空隙 */
        }
        
        /* 分类触觉重写 */
        .category-pill { transition: all 0.4s cubic-bezier(0.15, 0.85, 0.35, 1); position: relative; }
        .category-pill::after { content: ''; position: absolute; bottom: -2px; left: 50%; width: 0; height: 1px; background: var(--accent); transition: all 0.4s ease; transform: translateX(-50%); }
        .category-pill.active { color: var(--accent) !important; font-weight: 500; }
        .category-pill.active::after { width: 16px; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; } 
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 优雅的渐进式入场 */
        @keyframes subtleFadeUp { 
            from { opacity: 0; transform: translateY(15px); filter: blur(2px); } 
            to { opacity: 1; transform: translateY(0); filter: blur(0); } 
        }
        .fade-up { animation: subtleFadeUp 0.8s cubic-bezier(0.15, 0.85, 0.35, 1) forwards; }
        
        /* 移动端材质双击触觉放大 */
        #zoomModal { position: fixed; inset: 0; background: #0F0F0E; z-index: 200; display: none; align-items: center; justify-content: center; }
        #zoomViewport { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; cursor: grab; }
        #zoomImg { max-width: 95%; max-height: 90%; object-fit: contain; transition: transform 0.15s ease-out; }

        /* 移动端高定圆角底座导航 */
        .mobile-nav { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
            width: calc(100% - 32px); max-width: 380px; height: 56px;
            background: rgba(22, 22, 21, 0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: 28px; display: flex; align-items: center; justify-content: space-around;
            box-shadow: 0 12px 40px rgba(0,0,0,0.15); z-index: 90; padding: 0 10px;
        }
        @media (min-width: 769px) { .mobile-nav { display: none; } }
        .mobile-nav a { display: flex; flex-direction: column; align-items: center; justify-content: center; color: rgba(255,255,255,0.4); font-size: 10px; font-weight: 500; letter-spacing: 0.1em; transition: all 0.3s; gap: 2px;}
        .mobile-nav a i { width: 18px; height: 18px; margin-bottom: 1px; stroke-width: 1.5; }
        .mobile-nav a.active { color: var(--accent); }

        /* 同步状态浮动提示 */
        .save-indicator { position: fixed; top: 100px; right: 24px; z-index: 200; padding: 10px 20px; border-radius: 4px; font-size: 11px; font-weight: 500; tracking: 0.05em; opacity: 0; transition: all 0.4s ease; transform: translateY(-10px); }
        .save-indicator.saving { background: #161615; color: #fff; border-left: 2px solid var(--accent); opacity: 1; transform: translateY(0); }
        .save-indicator.saved { background: #EFFFFA; color: #00A36C; border-left: 2px solid #00A36C; opacity: 1; transform: translateY(0); }
        .save-indicator.error { background: #FFEEEE; color: #D9383A; border-left: 2px solid #D9383A; opacity: 1; transform: translateY(0); }
    </style>
</head>
<body class="selection:bg-neutral-200">

    <div id="saveIndicator" class="save-indicator"></div>

    <!-- 极简高定导航栏 -->
    <nav class="fixed top-0 w-full z-[60] glass border-b border-black/[0.02]">
        <div class="max-w-[1400px] mx-auto px-6 md:px-12 h-20 md:h-24 flex items-center justify-between">
            <div class="flex items-center gap-12">
                <a href="#" onclick="goHome(event)" class="text-xl md:text-2xl font-medium tracking-[0.25em] serif-title">SHANYAO</a>
                <div class="hidden md:flex gap-8 text-[11px] uppercase tracking-[0.2em] font-medium opacity-50">
                    <a href="#" onclick="goHome(event)" class="hover:text-[var(--accent)] hover:opacity-100 transition-all">首页 / HOME</a>
                    <a href="inspiration.html" class="hover:text-[var(--accent)] hover:opacity-100 transition-all">灵感 / INSPIRATION</a>
                </div>
            </div>
            <div class="flex items-center gap-6">
                <button onclick="handleAdminAccess()" class="flex items-center gap-2 group text-neutral-400 hover:text-[var(--text-main)] transition-colors">
                    <span class="text-[10px] uppercase tracking-[0.2em] font-medium hidden sm:inline opacity-60 group-hover:opacity-100">Curation 工作台</span>
                    <i data-lucide="menu" class="w-5 h-5 stroke-[1.2]"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- 主体视窗 -->
    <div id="homePage" class="pt-28 md:pt-40 pb-24 max-w-[1400px] mx-auto px-6 md:px-12">
        <header id="top" class="mb-14 md:mb-20 fade-up">
            <div class="flex flex-col md:flex-row md:items-end justify-between gap-8">
                <div class="max-w-3xl">
                    <h2 class="text-[10px] uppercase tracking-[0.4em] text-[var(--accent)] font-semibold mb-4">ESTABLISHED 2026</h2>
                    <h1 class="text-4xl md:text-6xl serif-title leading-[1.25] text-neutral-900 font-light">
                        闪光留韵 <span class="italic text-neutral-400 font-extralight">/</span> 耀影成诗
                    </h1>
                    <p class="text-xs text-neutral-400 mt-4 tracking-[0.1em] font-light leading-relaxed">让空间充满诗意，精选艺术家具高定画册</p>
                </div>
                <div class="flex flex-col items-end gap-6 w-full md:w-auto">
                    <div class="relative w-full md:w-72 group">
                        <input type="text" id="searchInput" oninput="handleSearch(this.value)" placeholder="探索灵感单品..." class="w-full bg-transparent border-b border-black/[0.08] py-2 focus:border-black outline-none transition-all placeholder:text-neutral-300 text-sm tracking-wide">
                        <i data-lucide="search" class="absolute right-0 top-1/2 -translate-y-1/2 w-4 h-4 opacity-30 group-focus-within:opacity-100 transition-opacity stroke-[1.5]"></i>
                    </div>
                </div>
            </div>
        </header>

        <!-- 诗意分类轴 -->
        <div class="relative mb-12 md:mb-16 fade-up" style="animation-delay:0.1s">
            <div id="categoryContainer" class="flex overflow-x-auto gap-8 no-scrollbar pb-2 touch-pan-x text-xs uppercase tracking-[0.15em] text-neutral-400"></div>
        </div>

        <!-- 自定义小工具动态投放区 -->
        <div id="widgetContainer" class="mb-12"></div>
        
        <!-- 核心重构：艺术瀑布流网格（CSS Masonry Grid） -->
        <div id="productGrid" class="masonry-grid scroll-mt-24"></div>
    </div>

    <!-- 高奢沉浸式详情剧幕 -->
    <div id="detailPage" class="hidden min-h-screen pb-24 bg-white">
        <div class="sticky top-0 z-50 glass border-b border-black/[0.02] flex items-center justify-between h-16 px-6 md:px-12">
            <button onclick="closeDetail()" class="flex items-center gap-2 text-xs uppercase tracking-[0.15em] opacity-50 hover:opacity-100 transition-opacity">
                <i data-lucide="arrow-left" class="w-4 h-4 stroke-[1.5]"></i>
                <span>返回画廊 / BACK</span>
            </button>
            <div class="text-[11px] font-medium tracking-[0.2em] uppercase text-neutral-400" id="detailTopTitle"></div>
            <div class="w-20"></div>
        </div>

        <div class="pt-8 md:pt-16 max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-12 md:gap-16 px-6">
            <!-- 左：多维度视觉轮播 -->
            <div class="space-y-4">
                <div class="relative overflow-hidden bg-[#FBFBFA] rounded-sm aspect-square flex items-center justify-center group" id="carouselWrap">
                    <button onclick="prevSlide()" class="absolute left-4 z-10 w-10 h-10 bg-white/80 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all hover:bg-white shadow-sm"><i data-lucide="chevron-left" class="w-4 h-4 text-neutral-600"></i></button>
                    <button onclick="nextSlide()" class="absolute right-4 z-10 w-10 h-10 bg-white/80 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all hover:bg-white shadow-sm"><i data-lucide="chevron-right" class="w-4 h-4 text-neutral-600"></i></button>
                    <div class="flex w-full h-full transition-transform duration-700 cubic-bezier(0.15, 0.85, 0.35, 1)" id="carouselTrack"></div>
                    <div class="absolute bottom-4 left-50% translate-x-[-50%] flex gap-1.5" id="carouselDots"></div>
                </div>
                <div id="thumbSection" class="pt-2">
                    <div class="thumb-row no-scrollbar flex gap-3 overflow-x-auto" id="thumbRow"></div>
                </div>
            </div>

            <!-- 右：高定作品叙事描述 -->
            <div class="flex flex-col justify-between py-2">
                <div class="space-y-6">
                    <div class="border-b border-black/[0.04] pb-6">
                        <h1 class="text-3xl md:text-4xl font-light tracking-wide text-neutral-900 mb-4" id="detailName"></h1>
                        <div class="flex items-baseline gap-4">
                            <span class="text-2xl font-light text-[var(--accent)] tracking-wide" id="detailPrice"></span>
                            <span class="text-xs text-neutral-300 line-through font-light" id="detailOrigPrice"></span>
                        </div>
                    </div>
                    
                    <div>
                        <p class="text-xs uppercase tracking-[0.2em] text-neutral-400 font-medium mb-3">作品释义 / ESSENCE</p>
                        <p class="text-sm text-neutral-500 leading-relaxed font-light" id="detailDesc"></p>
                    </div>
                    
                    <div id="variantSection" class="pt-2">
                        <p class="text-xs uppercase tracking-[0.2em] text-neutral-400 font-medium mb-3">限定形态 / MATERIAL</p>
                        <div id="variantBtns" class="flex flex-wrap gap-2.5"></div>
                    </div>
                </div>

                <div class="bg-[#FBFBFA] p-6 rounded border border-black/[0.01] text
