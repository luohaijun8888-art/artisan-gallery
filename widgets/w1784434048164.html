        // 稳健的高精度 Excel 日期序列解析器
        function parseExcelDate(val) {
            if(!val) return '2026-07-15';
            if(typeof val === 'number') {
                const date = new Date((val - 25569) * 86400 * 1000);
                return date.toISOString().slice(0, 10);
            }
            if(val instanceof Date) {
                return val.toISOString().slice(0, 10);
            }
            const s = String(val).trim();
            if(/^\d{4}[-\/]\d{1,2}[-\/]\d{1,2}/.test(s)) {
                const parts = s.split(/[-\/]/);
                const y = parts[0];
                const m = parts[1].padStart(2, '0');
                const d = parts[2].split(' ')[0].padStart(2, '0');
                return `${y}-${m}-${d}`;
            }
            return s;
        }

        // 正则省份智能分析
        function extractProvince(addr) {
            if(!addr) return "未知";
            const ps = ['云南省','湖南省','重庆市','山西省','陕西省','甘肃省','四川省','贵州省','湖北省','河南省','山东省','江苏省','浙江省','福建省','广东省','广西壮族自治区','内蒙古自治区','新疆维吾尔自治区','西藏自治区','宁夏回族自治区','青海省','海南省'];
            for(const p of ps) if(addr.includes(p)) return p;
            const m = addr.match(/^(.*?省|.*?自治区|北京|上海|天津|重庆)/);
            return m ? m[1].trim() : addr.slice(0, 3);
        }

        // 智能箱名识别算法：根据当前分包索引和总包数自动返回预设箱名
        function getDefaultBoxName(pkgIndex, totalPkgs) {
            if (totalPkgs <= 1) return "";
            if (totalPkgs === 2) {
                if (pkgIndex === 1) return "台面箱";
                if (pkgIndex === 2) return "架子箱";
            }
            if (totalPkgs === 3) {
                if (pkgIndex === 1) return "台面箱";
                if (pkgIndex === 2) return "架子箱";
                if (pkgIndex === 3) return "五金包";
            }
            if (pkgIndex === 1) return "台面箱";
            if (pkgIndex === 2) return "门板箱";
            if (pkgIndex === 3) return "架子箱";
            if (pkgIndex === 4) return "五金包";
            return `配件包${pkgIndex - 4}`;
        }

        // 绑定拖拽上传
        function setupFileHandlers() {
            const dz = document.getElementById('dropzone'), fi = document.getElementById('fileInput');
            dz.addEventListener('click', ()=>fi.click());
            dz.addEventListener('dragover', e=>{ e.preventDefault(); dz.classList.add('border-indigo-500','bg-indigo-50/20'); });
            dz.addEventListener('dragleave', ()=>dz.classList.remove('border-indigo-500','bg-indigo-50/20'));
            dz.addEventListener('drop', e=>{
                e.preventDefault();
                dz.classList.remove('border-indigo-500','bg-indigo-50/20');
                if(e.dataTransfer.files.length) handleExcelFile(e.dataTransfer.files[0]);
            });
            fi.addEventListener('change', e=>{ if(e.target.files.length) handleExcelFile(e.target.files[0]); });
        }

        function handleExcelFile(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const wb = XLSX.read(data, { type:'array' });
                    const ws = wb.Sheets[wb.SheetNames[0]];
                    const json = XLSX.utils.sheet_to_json(ws, { defval:"" });
                    if(!json.length) { showToast("Excel表格中未检索到有效行数据","error"); return; }

                    const clean = [], last = {};
                    const map = {
                        'poNumber':['采购订单','采购单号','PO'],
                        'sender':['发货方','送货方','供应商'],
                        'carrier':['物流商','承运人'],
                        'receiver':['经销商名称','收货方','收货经销商'],
                        'contact':['收货联系人','仓库联系人','联系人'],
                        'address':['收货地址','仓库地址','送货地址'],
                        'phone':['收货电话','仓库电话','电话'],
                        'orderId':['客户PO','订单号','销售单号'],
                        'itemCode':['物料编码','产品编码'],
                        'itemName':['物料名称','产品名称'],
                        'shippingDate':['用户需求日期','需求日期','计划日期'],
                        'quantity':['需求数量','数量'],
                        'subCode':['物料编码','分包编码'],
                        'subName':['物料名称','分包名称'],
                        'unit':['单位'],
                        'packagesCount':['总件数','件数','包数'],
                        'weight':['总重量（kg）','总重量','重量'],
                        'volume':['总体积（m³）','总体积','体积'],
                        'dealerCode':['经销商账号','经销商编码'],
                        'dealerName':['经销商名称','收货方名称'],
                        'province':['省份','省份2']
                    };

                    json.forEach((row, idx) => {
                        const keys = Object.keys(row);
                        if(!keys.length) return;
                        const str = Object.values(row).join("").replace(/\s+/g,"");
                        if(str.includes('合计')||str.includes('汇总')||str.includes('总计')) return;

                        let ext = {};
                        for(const [k, ks] of Object.entries(map)) {
                            let found = false;
                            for(const pk of ks) {
                                const m = keys.find(x => x.trim()===pk || x.trim().includes(pk));
                                if(m) { 
                                    ext[k] = row[m]!==undefined&&row[m]!==null ? String(row[m]).trim() : ''; 
                                    found = true; 
                                    break; 
                                }
                            }
                            if(!found) ext[k]='';
                        }

                        // 支持向上继承空白列
                        const po = ext.poNumber || last.poNumber || "SCC2607060233";
                        const sender = ext.sender || last.sender || "索菲亚家居股份有限公司";
                        const carrier = ext.carrier || last.carrier || "城际物流";
                        const receiver = ext.receiver || last.receiver || "未知收货方";
                        const contact = ext.contact || last.contact || "未知联系人";
                        const address = ext.address || last.address || "未知地址";
                        const phone = ext.phone || last.phone || "未知电话";
                        const orderId = ext.orderId || last.orderId || "未知订单号";
                        const shippingDate = parseExcelDate(ext.shippingDate || last.shippingDate);
                        const dealerCode = ext.dealerCode || last.dealerCode || "P00000";
                        const dealerName = ext.dealerName || last.dealerName || receiver;

                        if(po) last.poNumber=po; if(sender) last.sender=sender; if(carrier) last.carrier=carrier;
                        if(receiver) last.receiver=receiver; if(contact) last.contact=contact;
                        if(address) last.address=address; if(phone) last.phone=phone;
                        if(orderId) last.orderId=orderId; if(shippingDate) last.shippingDate=shippingDate;
                        if(dealerCode) last.dealerCode=dealerCode; if(dealerName) last.dealerName=dealerName;

                        const itemCode = ext.itemCode || "未知编码";
                        const itemName = ext.itemName || "未知物料名称";
                        const quantity = ext.quantity ? parseFloat(ext.quantity)||0 : 0;
                        const packagesCount = ext.packagesCount ? parseInt(ext.packagesCount)||1 : 1;
                        const weight = ext.weight ? parseFloat(ext.weight)||0 : 0;
                        const volume = ext.volume ? parseFloat(ext.volume)||0 : 0;
                        const unit = ext.unit || "张";
                        if(!itemCode && !itemName && quantity===0) return;
                        const province = ext.province || extractProvince(address);

                        clean.push({ 
                            poNumber:po, sender, carrier, receiver, contact, address, phone, 
                            orderId, itemCode, itemName, quantity, shippingDate, 
                            subCode:itemCode, subName:itemName, unit, packagesCount, 
                            weight, volume, dealerCode, dealerName, rowIndex:idx+1, province 
                        });
                    });

                    rawDataList = clean;
                    renderDiagnostics(file.name);
                    showToast(`Excel数据解析成功！共加载并核验了 ${rawDataList.length} 条有效明细记录`);
                    processAndRender();
                } catch(err) { 
                    console.error(err); 
                    showToast("文件解析失败，请确保格式正确","error"); 
                }
            };
            reader.readAsArrayBuffer(file);
        }

        async function exportToHighPrecisionPDF() {
            const btn = document.getElementById('exportPdfBtn');
            const icon = document.getElementById('exportIcon');
            const text = document.getElementById('exportText');

            if (!rawDataList.length) { showToast("暂无可用明细，请先导入数据后再行编译导出","error"); return; }

            // 锁定按钮
            btn.disabled = true;
            btn.classList.add('opacity-75', 'cursor-wait');
            icon.className = "fa-solid fa-circle-notch animate-spin";
            text.innerText = "正在高清编译...";

            const overlay = document.getElementById('exportOverlay');
            const statusText = document.getElementById('exportStatusText');
            const subText = document.getElementById('exportSubText');
            const progressFill = document.getElementById('exportProgressFill');
            
            overlay.classList.add('active');
            statusText.textContent = '初始化缓冲区...';
            subText.textContent = '正在构建文档排版页面...';
            progressFill.style.width = '0%';

            const container = document.getElementById('printArea');
            const isDelivery = (currentView === 'delivery');
            const pageClass = isDelivery ? '.preview-page-delivery' : '.preview-page-logistics';
            const pageElements = container.querySelectorAll(pageClass);

            if (!pageElements.length) {
                showToast("未检测到当前视图下可导出的页面", "error");
                overlay.classList.remove('active');
                btn.disabled = false;
                btn.classList.remove('opacity-75', 'cursor-wait');
                icon.className = "fa-solid fa-file-pdf";
                text.innerText = "导出合并PDF";
                return;
            }

            const total = pageElements.length;
            subText.textContent = `共计发现 ${total} 页`;
            statusText.textContent = '开始进行一键高保真离屏渲染...';

            const pageWidth = isDelivery ? 240 : 105;
            const pageHeight = isDelivery ? 140 : 145;
            const MM_TO_PX = 3.7795;
            const canvasW = pageWidth * MM_TO_PX;
            const canvasH = pageHeight * MM_TO_PX;

            try {
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF({
                    unit: 'mm',
                    format: [pageWidth, pageHeight],
                    orientation: isDelivery ? 'landscape' : 'portrait',
                    compress: true
                });

                for (let i = 0; i < total; i++) {
                    statusText.textContent = `正在完美映射第 ${i+1}/${total} 页...`;
                    progressFill.style.width = `${((i) / total) * 90}%`;

                    const el = pageElements[i];
                    const clone = el.cloneNode(true);

                    // 彻底清除预览时的投影、外层多余间距与灰色边框
                    clone.style.boxShadow = 'none';
                    clone.style.margin = '0';
                    clone.style.borderRadius = '0';
                    clone.style.outline = 'none';
                    clone.style.border = 'none';

                    // 彻底移除 clone 内带有 no-print 属性的行内控件
                    const noPrints = clone.querySelectorAll('.no-print');
                    noPrints.forEach(np => np.remove());

                    // 1:1 像素级严苛锁定：不进行任何外围百分比缩小或 matrix 变换，保持与预览绝对一致的折行与字体大小！
                    clone.style.width = canvasW + 'px';
                    clone.style.height = canvasH + 'px';
                    clone.style.minWidth = canvasW + 'px';
                    clone.style.maxWidth = canvasW + 'px';
                    clone.style.minHeight = canvasH + 'px';
                    clone.style.maxHeight = canvasH + 'px';
                    clone.style.overflow = 'hidden';
                    clone.style.background = '#ffffff';
                    clone.style.boxSizing = 'border-box';
                    clone.style.position = 'relative';

                    // 强力网格硬化：重构为极其精准的 1px 细线，完美契合预览版表格粗细，彻底避开 html2canvas 渲染多重粗线 Bug
                    const blackTables = clone.querySelectorAll('table.black-border-table');
                    blackTables.forEach(t => {
                        t.style.setProperty('border-collapse', 'separate', 'important');
                        t.style.setProperty('border-spacing', '0', 'important');
                        t.style.setProperty('border-top', '1px solid #000000', 'important');
                        t.style.setProperty('border-left', '1px solid #000000', 'important');
                        t.style.setProperty('border-right', 'none', 'important');
                        t.style.setProperty('border-bottom', 'none', 'important');
                        t.style.setProperty('width', '100%', 'important');

                        const cells = t.querySelectorAll('td, th');
                        cells.forEach(cell => {
                            cell.style.setProperty('border-top', 'none', 'important');
                            cell.style.setProperty('border-left', 'none', 'important');
                            cell.style.setProperty('border-right', '1px solid #000000', 'important');
                            cell.style.setProperty('border-bottom', '1px solid #000000', 'important');
                            cell.style.setProperty('padding', '5px 4px', 'important');
                            cell.style.setProperty('vertical-align', 'middle', 'important');
                            cell.style.setProperty('text-align', 'center', 'important');
                        });
                    });

                    // 异步装载至离屏安全沙盒进行画质快照
                    const tempDiv = document.createElement('div');
                    tempDiv.style.cssText = 'position:absolute; left:-9999px; top:0; z-index:-1; width:auto; height:auto; background:white;';
                    tempDiv.appendChild(clone);
                    document.body.appendChild(tempDiv);

                    // 超高清3倍渲染，实现完美的印刷抗锯齿和线条硬化
                    const canvas = await html2canvas(clone, {
                        scale: 3,
                        useCORS: true,
                        logging: false,
                        backgroundColor: '#ffffff',
                        width: canvasW,
                        height: canvasH
                    });

                    document.body.removeChild(tempDiv);
                    const imgData = canvas.toDataURL('image/jpeg', 0.98);

                    if (i > 0) {
                        pdf.addPage([pageWidth, pageHeight]);
                    }
                    pdf.addImage(imgData, 'JPEG', 0, 0, pageWidth, pageHeight);
                }

                // 编译成功，触发下载
                progressFill.style.width = '100%';
                statusText.textContent = '磁盘写入中，正在保存PDF二进制文档...';

                const filename = isDelivery ? `供应商送货单_合并打印_${total}页.pdf` : `物流标签_拼版印刷_${total}页.pdf`;
                pdf.save(filename);

                overlay.classList.remove('active');
                showToast(`✅ 完美高保真 PDF 导出成功！共计 ${total} 页`);
            } catch (err) {
                console.error('PDF导出编译链发生异常:', err);
                overlay.classList.remove('active');
                showToast('PDF离屏合成编译时发生异常，请重试', 'error');
            } finally {
                btn.disabled = false;
                btn.classList.remove('opacity-75', 'cursor-wait');
                icon.className = "fa-solid fa-file-pdf";
                text.innerText = "导出合并PDF";
            }
        }

        // 轻量Toast消息栈
        function showToast(msg, type='success') {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toastIcon');
            const el = document.getElementById('toastMessage');
            el.textContent = msg;
            icon.innerHTML = type==='error' ? '<i class="fa-solid fa-circle-exclamation"></i>' : '<i class="fa-solid fa-circle-check"></i>';
            icon.className = type==='error' ? 'text-red-400 text-lg' : 'text-emerald-400 text-lg';
            toast.classList.remove('translate-y-20','opacity-0');
            toast.classList.add('translate-y-0','opacity-100');
            clearTimeout(toast._timer);
            toast._timer = setTimeout(()=>{
                toast.classList.add('translate-y-20','opacity-0');
                toast.classList.remove('translate-y-0','opacity-100');
            }, 3000);
        }

        // 引导启动
        setupFileHandlers();
        changeView('delivery');
    </script>
